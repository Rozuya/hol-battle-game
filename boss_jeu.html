<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mode Boss Battle</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; background: #0a0000; color: #fff; margin: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; padding: 10px; }
        .container { width: 100%; max-width: 500px; background: #1a0505; padding: 20px; border-radius: 15px; border: 2px solid #ff4444; box-shadow: 0 0 15px rgba(255,0,0,0.3); }
        .bar-bg { height: 20px; background: #333; border-radius: 10px; overflow: hidden; margin: 5px 0; border: 1px solid #555; }
        .p-bar { height: 100%; background: #9146ff; width: 100%; transition: width 0.3s; }
        .b-bar { height: 100%; background: linear-gradient(90deg, #ff0000, #ffaa00); width: 100%; transition: width 0.3s; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn { padding: 12px; background: #220000; border: 1px solid #ff4444; color: white; cursor: pointer; border-radius: 8px; font-size: 0.85rem; line-height: 1.2; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        #log-text { min-height: 40px; color: #ffaa00; font-style: italic; text-align: center; margin: 15px 0; font-weight: bold; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; }
    </style>
</head>
<body>
    <div id="endModal" class="modal"><div class="container" style="text-align:center"><h1 id="modal-title"></h1><p id="modal-desc"></p><div id="modal-btns"></div></div></div>

    <div class="container">
        <h2 id="level-display" style="text-align:center; color:#ffaa00; margin-top:0;">NIVEAU 1</h2>
        <div style="display:flex; gap:10px;">
            <div style="flex:1"><b>Joueur</b><div class="bar-bg"><div id="p-bar" class="p-bar"></div></div><div id="p-hp"></div></div>
            <div style="flex:1"><b>Boss</b><div class="bar-bg"><div id="e-bar" class="b-bar"></div></div><div id="e-hp"></div></div>
        </div>
        <div id="log-text">Le combat commence !</div>
        <div id="btn-grid" class="btn-grid"></div>
    </div>

    <script>
        // --- Tes données (Héros et Boss) restent les mêmes ---
        const playerChars = {
            "House of Laura": {hp: 220, skills: [{n:'Chat Spam',v:25,t:'dmg',cd:0}, {n:'BRB',v:40,t:'heal',cd:2}, {n:'Host Raid',v:45,t:'dmg',cd:1}, {n:'Donation',v:60,t:'dmg',cd:2}, {n:'Stream Event',v:90,t:'dmg',cd:3}, {n:'Partner Prime',v:125,t:'dmg',cd:5}]},
            /* ... (Ajoute tes autres personnages ici comme avant) ... */
        };
        // ... (Ton tableau de boss et logique de scaling restent identiques) ...

        function updateUI() {
            document.getElementById('level-display').innerText = `NIVEAU ${currentLevel}`;
            document.getElementById('p-hp').innerText = `${pHP} / ${pMaxHP}`;
            document.getElementById('e-hp').innerText = `${eHP} / ${eMaxHP}`;
            document.getElementById('p-bar').style.width = (pHP/pMaxHP*100) + "%";
            document.getElementById('e-bar').style.width = (eHP/eMaxHP*100) + "%";
            
            const grid = document.getElementById('btn-grid'); grid.innerHTML = '';
            pS.forEach((s) => {
                let b = document.createElement('button'); b.className = 'btn';
                b.disabled = !isPlayerTurn || s.cdActuel > 0;
                b.innerHTML = `<strong>${s.n}</strong><br>${s.v} ${s.t==='dmg'?'dégâts':'soin'}<br>${s.cdActuel>0 ? 'CD:'+s.cdActuel : 'PRÊT'}`;
                b.onclick = () => {
                    actionEnCours = true;
                    if(s.t==='dmg') { eHP -= s.v; document.getElementById('log-text').innerText = `${pName} utilise ${s.n} : ${s.v} dégâts !`; }
                    else { pHP = Math.min(pMaxHP, pHP + s.v); document.getElementById('log-text').innerText = `${pName} utilise ${s.n} : ${s.v} soin !`; }
                    s.cdActuel = s.cd + 1; isPlayerTurn = false;
                    setTimeout(() => { if(eHP <= 0) endGame(true); else aiTurn(); }, 1500);
                };
                grid.appendChild(b);
            });
        }
        // ... (La fonction aiTurn et reste du code) ...
    </script>
</body>
</html>
