<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choisis ton héros</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1 style="color: #9146ff; margin-bottom: 30px;">Choisis ton héros</h1>
        <div id="roster" style="display: flex; flex-direction: column; gap: 15px;"></div>
    </div>

    <script>
        const chars = {
            "House of Laura": "Équilibré",
            "HOL Rozuya": "Soutien / Soigneur",
            "HOL Tony": "Tank / Force",
            "HOL Omass": "Offensif",
            "K974YT": "Assassin / Burst",
            "Dark MortelCygne": "Vampire (Agressif)"
        };

        const rosterDiv = document.getElementById('roster');

        Object.keys(chars).forEach(name => {
            let b = document.createElement('button');
            b.className = 'btn';
            // Le style ici force l'aspect de ta capture d'écran
            b.style.height = "auto";
            b.style.padding = "20px";
            b.style.textAlign = "center";
            b.innerHTML = `<strong>${name}</strong><br><small style="color: #ccc;">${chars[name]}</small>`;
            
            b.onclick = () => { 
                localStorage.setItem('char', name); 
                location.href = 'jeu.html'; 
            };
            rosterDiv.appendChild(b);
        });
    </script>
</body>
</html>
