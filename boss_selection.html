<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sélection Boss Battle</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; background: #0a0000; color: #fff; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        h1 { color: #ff4444; margin-bottom: 30px; text-align: center; }
        .hero-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; width: 100%; max-width: 600px; }
        .hero-btn { padding: 20px; background: #220000; border: 2px solid #ff4444; color: white; cursor: pointer; border-radius: 10px; font-weight: bold; transition: 0.3s; }
        .hero-btn:hover { background: #440000; transform: scale(1.05); }
        .back-btn { margin-top: 30px; padding: 10px 20px; background: #333; border: none; color: white; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

    <h1>Choisis ton héros pour le Mode Boss</h1>

    <div class="hero-grid" id="hero-list">
        <!-- Les boutons seront générés ici -->
    </div>

    <button class="back-btn" onclick="location.href='index.html'">Retour à l'accueil</button>

    <script>
        const heroes = ["House of Laura", "HOL Rozuya", "HOL Tony", "HOL Omass", "K974YT", "Dark MortelCygne"];
        const container = document.getElementById('hero-list');

        heroes.forEach(hero => {
            let btn = document.createElement('button');
            btn.className = 'hero-btn';
            btn.innerText = hero;
            btn.onclick = () => {
                // On enregistre le héros pour le mode Boss
                localStorage.setItem('bossChar', hero);
                // On s'assure que le niveau commence bien à 1 si c'est une nouvelle partie
                // Si tu veux permettre de reprendre une sauvegarde, ne pas reset le bossLevel ici
                if(!localStorage.getItem('bossLevel')) {
                    localStorage.setItem('bossLevel', 1);
                }
                location.href = 'boss_jeu.html';
            };
            container.appendChild(btn);
        });
    </script>
</body>
</html>
