<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Combat - HOL Battle Game</title>
</head>
<body>
    <div class="container">
        <!-- Sélection du héros -->
        <div id="roster" class="roster"></div>
        
        <!-- Zone de combat -->
        <div id="battle" style="display:none">
            <div class="arena">
                <div><div id="p-name"></div><div class="health-bar-bg"><div id="p-bar" class="health-fill"></div></div></div>
                <div><div id="e-name"></div><div class="health-bar-bg"><div id="e-bar" class="health-fill" style="background:#ff4646"></div></div></div>
            </div>
            <div id="log" style="padding: 15px; margin: 20px 0; background: #1a1a1a; border: 1px solid #9146ff; border-radius: 8px;">Prêt à combattre ?</div>
            <div id="actions" class="action-grid"></div>
        </div>
    </div>

    <script>
        const charData = { 
            "House of Laura": {hp:260, skills:[{n:'Hype',d:40},{n:'Pause',d:10},{n:'Raid',d:60},{n:'Soutien',d:20}]}, 
            "HOL Rozuya": {hp:230, skills:[{n:'Code',d:20},{n:'Debug',d:30},{n:'Compile',d:30},{n:'Backup',d:40}]} 
        };

        let count = localStorage.getItem('skillCount') || 4;
        let pName, eName, pHP, eHP, pMax, eMax, pS, eS, isPlayerTurn = true;

        // Génération du menu héros
        Object.keys(charData).forEach(n => {
            let b = document.createElement('button'); b.className = 'btn'; b.innerText = n;
            b.onclick = () => start(n); document.getElementById('roster').appendChild(b);
        });

        function start(n) {
            pName = n; 
            let ops = Object.keys(charData).filter(x => x !== n);
            eName = ops[Math.floor(Math.random() * ops.length)];
            pHP = pMax = charData[pName].hp; eHP = eMax = charData[eName].hp;
            pS = charData[pName].skills.slice(0, count);
            eS = charData[eName].skills.slice(0, count);
            document.getElementById('roster').style.display = 'none';
            document.getElementById('battle').style.display = 'block';
            updateUI();
        }

        function updateUI() {
            document.getElementById('p-name').innerText = `${pName} (${pHP})`;
            document.getElementById('e-name').innerText = `${eName} (${eHP})`;
            document.getElementById('p-bar').style.width = (pHP/pMax*100) + "%";
            document.getElementById('e-bar').style.width = (eHP/eMax*100) + "%";
            
            let act = document.getElementById('actions'); act.innerHTML = '';
            
            if(isPlayerTurn) {
                pS.forEach((s, i) => {
                    let b = document.createElement('button'); b.className = 'skill'; b.innerText = s.n;
                    b.onclick = () => play(i); act.appendChild(b);
                });
            } else {
                act.innerHTML = '<p style="color:#9146ff; grid-column:span 2;">L\'IA réfléchit...</p>';
            }
        }

        function play(i) {
            if(!isPlayerTurn) return;
            
            // Tour Joueur
            eHP = Math.max(0, eHP - pS[i].d);
            document.getElementById('log').innerText = `Tu as utilisé ${pS[i].n} (-${pS[i].d} HP)`;
            isPlayerTurn = false;
            updateUI();

            if(eHP <= 0) { setTimeout(() => { alert("Victoire !"); location.reload(); }, 500); return; }

            // Tour IA
            setTimeout(() => {
                let s = eS[Math.floor(Math.random() * eS.length)];
                pHP = Math.max(0, pHP - s.d);
                document.getElementById('log').innerText = `L'IA a utilisé ${s.n} (-${s.d} HP)`;
                isPlayerTurn = true;
                updateUI();
                if(pHP <= 0) { setTimeout(() => { alert("Défaite..."); location.reload(); }, 500); }
            }, 1500);
        }
    </script>
</body>
</html>
