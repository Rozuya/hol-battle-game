<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Jeu en cours</title>
    <style>
        @keyframes gradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; height: 100vh; color: white; display: flex; flex-direction: column;
               background: linear-gradient(-45deg, #0f172a, #312e81, #1e1b4b, #0f172a); background-size: 400% 400%; animation: gradient 15s ease infinite; }
        
        #header { display: flex; justify-content: space-between; padding: 20px; background: rgba(0,0,0,0.2); }
        .btn-quit { background: #991b1b; padding: 10px 20px; border: none; color: white; cursor: pointer; border-radius: 5px; font-weight: bold; }
        
        .arena { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 20px; }
        .card { width: 120px; height: 160px; background: rgba(255,255,255,0.1); border: 2px solid #a78bfa; border-radius: 10px; display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <div id="header">
        <div>HOUSE OF LAURA - ARÈNE</div>
        <button class="btn-quit" onclick="window.location.href='index.html'">QUITTER</button>
    </div>

    <div class="arena">
        <div class="card">Ennemi</div>
        <div style="font-size: 1.5rem;">VS</div>
        <div class="card">Toi</div>
    </div>

</body>
</html>
