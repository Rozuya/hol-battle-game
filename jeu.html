<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Combat</title>
</head>
<body>
    <div class="container">
        <h1>Le Combat commence !</h1>
        <p id="diff-display" style="font-weight: bold;"></p>

        <h3>Ton équipe</h3>
        <div class="hero-box" id="my-team"></div>

        <h3>Équipe adverse</h3>
        <div class="hero-box" id="enemy-team"></div>

        <br>
        <a href="index.html" class="btn">Retour Menu</a>
    </div>

    <script>
        // 1. Liste des héros
        const heroes = ["HOL Omass", "K974YT", "HOL Rozuya", "House of Laura", "Dark Mortel", "HOL Tony"];
        
        // 2. Mélange (Aléatoire)
        let shuffled = heroes.sort(() => 0.5 - Math.random());
        let myTeam = shuffled.slice(0, 3);
        let enemyTeam = shuffled.slice(3, 6);

        // 3. Affichage
        document.getElementById('my-team').innerHTML = myTeam.map(h => `<div class="hero-card">${h}</div>`).join('');
        document.getElementById('enemy-team').innerHTML = enemyTeam.map(h => `<div class="hero-card">${h}</div>`).join('');

        // 4. Récupérer difficulté
        const urlParams = new URLSearchParams(window.location.search);
        const diff = urlParams.get('diff') || "Normal";
        document.getElementById('diff-display').innerText = "Difficulté : " + diff;
    </script>
</body>
</html>
