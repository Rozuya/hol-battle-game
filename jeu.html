<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House of Laura | Arène</title>
    <style>
        body { background: #0e0e10; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .team { display: flex; justify-content: center; gap: 20px; margin: 20px 0; }
        .card { width: 120px; padding: 10px; background: #18181b; border: 2px solid #333; cursor: pointer; border-radius: 8px; }
        .card.active { border-color: #9146ff; }
        .card.targetable { border-color: #ef4444; }
        .action-btn { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Arène 3v3</h1>
    <div id="setup">
        <h3>Choisir difficulté :</h3>
        <button onclick="startGame('easy')">Facile</button>
        <button onclick="startGame('hard')">Difficile</button>
    </div>
    <div id="game" style="display:none;">
        <div id="log">Sélectionne ton héros, puis un ennemi !</div>
        <h3>Ennemis</h3>
        <div id="enemy-team" class="team"></div>
        <h3>Ton équipe</h3>
        <div id="player-team" class="team"></div>
        <div id="actions"></div>
    </div>

    <script>
        let state = { pTeam: [], eTeam: [], turn: 'player', selectedHero: null, difficulty: 'easy' };
        
        function startGame(diff) {
            state.difficulty = diff;
            state.pTeam = [{name:"Laura", hp:100, dmg:30}, {name:"Tony", hp:100, dmg:25}, {name:"Rozuya", hp:100, dmg:20}];
            state.eTeam = [{name:"Hater1", hp:80, dmg:15}, {name:"Hater2", hp:80, dmg:15}, {name:"Hater3", hp:80, dmg:15}];
            document.getElementById('setup').style.display = 'none';
            document.getElementById('game').style.display = 'block';
            render();
        }

        function render() {
            document.getElementById('player-team').innerHTML = state.pTeam.map((h, i) => `<div class="card ${state.selectedHero === i ? 'active' : ''}" onclick="selectHero(${i})">${h.name}<br>${h.hp} HP</div>`).join('');
            document.getElementById('enemy-team').innerHTML = state.eTeam.map((h, i) => `<div class="card ${state.selectedHero !== null ? 'targetable' : ''}" onclick="attackEnemy(${i})">${h.name}<br>${h.hp} HP</div>`).join('');
        }

        function selectHero(i) { state.selectedHero = i; render(); }

        function attackEnemy(i) {
            if (state.selectedHero === null) return;
            let attacker = state.pTeam[state.selectedHero];
            state.eTeam[i].hp -= attacker.dmg;
            state.selectedHero = null;
            render();
            setTimeout(aiTurn, 1000);
        }

        function aiTurn() {
            let dmg = state.difficulty === 'hard' ? 25 : 10;
            let target = state.pTeam[Math.floor(Math.random() * state.pTeam.length)];
            target.hp -= dmg;
            render();
        }
    </script>
</body>
</html>
