<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Arena</title>
    <style>
        /* Animation fond slide identique */
        @keyframes gradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        body { margin: 0; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
               background: linear-gradient(-45deg, #060608, #18181b, #4c1d95, #060608); background-size: 400% 400%; animation: gradient 15s ease infinite; color: white; }

        .zone { display: flex; justify-content: center; gap: 20px; padding: 20px; background: rgba(0,0,0,0.3); }
        .card { width: 140px; height: 190px; background: #121212; border: 3px solid #444; border-radius: 12px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn { padding: 15px 30px; background: #9146ff; border: none; color: white; cursor: pointer; margin: 5px; border-radius: 6px; }
        #quit-btn { background: #b91c1c; position: absolute; top: 10px; right: 10px; padding: 10px 20px; }
    </style>
</head>
<body>

    <div id="setup" style="text-align:center; padding-top:20vh;">
        <h1>CHOISIR DIFFICULTÉ</h1>
        <button class="btn" onclick="init()">COMMENCER</button>
    </div>

    <div id="game-board" style="display:none; height:100vh; display:flex; flex-direction:column; justify-content:space-between;">
        <button id="quit-btn" onclick="window.location.href='index.html'">QUITTER</button>
        <div id="opponent-zone" class="zone"></div>
        <div style="text-align:center;"><h2>Combat en cours</h2><div id="actions"></div></div>
        <div id="player-zone" class="zone"></div>
    </div>

    <script>
        const ROSTER = [
            {n: "Laura", hp: 100}, {n: "Tony", hp: 100}, {n: "Rozuya", hp: 100},
            {n: "Omass", hp: 100}, {n: "K974YT", hp: 100}, {n: "Cygne", hp: 100}
        ];
        function init() {
            document.getElementById('setup').style.display = 'none';
            document.getElementById('game-board').style.display = 'flex';
            render();
        }
        function render() {
            document.getElementById('player-zone').innerHTML = ROSTER.slice(0,3).map(c => 
                `<div class="card"><strong>${c.n}</strong><p>${c.hp} HP</p></div>`).join('');
            document.getElementById('opponent-zone').innerHTML = ROSTER.slice(3,6).map(c => 
                `<div class="card"><strong>${c.n}</strong><p>${c.hp} HP</p></div>`).join('');
        }
    </script>
</body>
</html>
