<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>House of Laura | Arena</title>
    <style>
        body { margin: 0; background: #060608; color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }
        .zone { display: flex; justify-content: center; gap: 20px; padding: 20px; background: rgba(255,255,255,0.05); }
        .card { width: 140px; height: 190px; background: #121212; border: 3px solid #444; border-radius: 12px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .card:hover { border-color: #9146ff; }
        .btn { padding: 15px 30px; background: #9146ff; border: none; color: white; cursor: pointer; margin: 10px; border-radius: 6px; }
    </style>
</head>
<body>

    <div id="setup" style="text-align:center; padding-top:20vh;">
        <h1>CHOISIR DIFFICULTÉ</h1>
        <button class="btn" onclick="init()">COMMENCER</button>
    </div>

    <div id="game-board" style="display:none; flex-grow:1; display:flex; flex-direction:column; justify-content:space-between;">
        <div id="opponent-zone" class="zone"></div>
        <div style="text-align:center;"><h2>Combat</h2><div id="actions"></div></div>
        <div id="player-zone" class="zone"></div>
    </div>

    <script>
        const ROSTER = [
            {n: "Laura", hp: 100}, {n: "Tony", hp: 100}, {n: "Rozuya", hp: 100},
            {n: "Omass", hp: 100}, {n: "K974YT", hp: 100}, {n: "Cygne", hp: 100}
        ];

        function init() {
            document.getElementById('setup').style.display = 'none';
            document.getElementById('game-board').style.display = 'flex';
            render();
        }

        function render() {
            document.getElementById('player-zone').innerHTML = ROSTER.slice(0,3).map(c => 
                `<div class="card"><strong>${c.n}</strong><p>${c.hp} HP</p></div>`).join('');
            document.getElementById('opponent-zone').innerHTML = ROSTER.slice(3,6).map(c => 
                `<div class="card"><strong>${c.n}</strong><p>${c.hp} HP</p></div>`).join('');
        }
    </script>
</body>
</html>
