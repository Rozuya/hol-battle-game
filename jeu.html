<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House of Laura | Arène 3v3</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0e0e10;
            --panel-color: #18181b;
            --text-main: #ffffff;
            --text-dim: #a1a1aa;
            --twitch-purple: #9146ff;
            --danger-red: #ef4444;
            --success-green: #22c55e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: 'Roboto', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .header-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 2.5rem;
            color: var(--twitch-purple);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        #log-box {
            width: 100%;
            max-width: 800px;
            background: #000;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            color: var(--success-green);
            text-align: center;
            font-size: 1.1rem;
            margin-bottom: 30px;
            min-height: 54px;
        }

        .arena {
            display: flex;
            flex-direction: column;
            gap: 40px;
            width: 100%;
            max-width: 900px;
            align-items: center;
        }

        .team-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .vs-badge {
            background: var(--twitch-purple);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            padding: 8px 24px;
            border-radius: 30px;
            letter-spacing: 2px;
        }

        .card {
            width: 150px;
            background-color: var(--panel-color);
            border: 2px solid #333;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            position: relative;
        }

        .card.player { cursor: pointer; }
        .card.player:hover { transform: translateY(-5px); }
        .card.dead { opacity: 0.4; filter: grayscale(1); pointer-events: none; }

        .card-image-placeholder {
            width: 100%;
            height: 120px;
            background-color: #27272a;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dim);
            font-size: 0.8rem;
            background-size: cover;
            background-position: center;
        }

        .card-content {
            padding: 12px;
            text-align: center;
        }

        .card-name { font-size: 0.95rem; font-weight: bold; margin-bottom: 4px; }
        .card-rarity { font-size: 0.75rem; font-weight: bold; margin-bottom: 8px; }
        
        .hp-bar-bg { width: 100%; height: 6px; background: #333; border-radius: 3px; overflow: hidden; margin-bottom: 5px; }
        .hp-bar-fill { height: 100%; transition: width 0.3s ease; }
        .hp-text { font-size: 0.8rem; color: var(--text-dim); }

        #action-panel {
            margin-top: 30px;
            min-height: 60px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .action-btn {
            background: var(--panel-color);
            border: 1px solid #555;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            transition: all 0.2s ease;
        }

        .action-btn:hover { background: #333; border-color: white; }
    </style>
</head>
<body>

    <h1 class="header-title">Arène 3 vs 3</h1>
    <div id="log-box">Lancement du match...</div>

    <div class="arena">
        <div id="enemy-team" class="team-container"></div>
        <div class="vs-badge">VS</div>
        <div id="player-team" class="team-container"></div>
    </div>

    <div id="action-panel"></div>

    <script>
        const HEROES_DATABASE = [
            // J'ai retiré l'image ici pour House of Laura (img: "")
            { id: 0, name: "House of Laura", rarity: "Légendaire", emoji: "⭐", color: "#fbbf24", img: "", hp: 160, maxHp: 160, skills: [{ name: "Ban Hammer", dmg: 35 }, { name: "Soin Commu", dmg: -30 }] },
            { id: 1, name: "HOL Tony", rarity: "Épique", emoji: "🟣", color: "#a855f7", img: "", hp: 130, maxHp: 130, skills: [{ name: "Modération", dmg: 25 }, { name: "Sub Hype", dmg: 40 }] },
            { id: 2, name: "HOL Rozuya", rarity: "Rare", emoji: "🔵", color: "#3b82f6", img: "", hp: 110, maxHp: 110, skills: [{ name: "Troll", dmg: 20 }, { name: "Clip Parfait", dmg: 35 }] },
            { id: 3, name: "HOL Omass", rarity: "Rare", emoji: "🔵", color: "#3b82f6", img: "", hp: 110, maxHp: 110, skills: [{ name: "Spam Emote", dmg: 22 }, { name: "Donation", dmg: 30 }] },
            { id: 4, name: "K974YT", rarity: "Commune", emoji: "🟢", color: "#22c55e", img: "", hp: 90, maxHp: 90, skills: [{ name: "Follow", dmg: 18 }, { name: "Lurk", dmg: 25 }] },
            { id: 5, name: "Dark Mortel", rarity: "Commune", emoji: "🟢", color: "#22c55e", img: "", hp: 90, maxHp: 90, skills: [{ name: "Flamewar", dmg: 20 }, { name: "Backseat", dmg: 28 }] }
        ];

        let state = {
            playerTeam: [],
            enemyTeam: [],
            turn: 'player',
            selectedIdx: null
        };

        function initGame() {
            let deck = JSON.parse(JSON.stringify(HEROES_DATABASE));
            deck.sort(() => 0.5 - Math.random());
            
            state.playerTeam = deck.slice(0, 3);
            state.enemyTeam = deck.slice(3, 6);
            
            updateLog("Le match commence ! Sélectionne un personnage pour attaquer.");
            renderBoard();
        }

        function updateLog(message) {
            document.getElementById('log-box').innerText = "> " + message;
        }

        function getImageUrl(imgString) {
            if (!imgString) return '';
            return "background-image: url('" + encodeURIComponent(imgString).replace(/'/g, "%27") + "');";
        }

        function renderBoard() {
            const playerContainer = document.getElementById('player-team');
            const enemyContainer = document.getElementById('enemy-team');

            // Render Équipe Joueur
            playerContainer.innerHTML = state.playerTeam.map((hero, index) => {
                const isDead = hero.hp <= 0;
                const isSelected = state.selectedIdx === index;
                const borderStyle = isSelected ? "border-color: " + hero.color + "; box-shadow: 0 0 15px " + hero.color + ";" : "";
                const imgStyle = getImageUrl(hero.img);

                return '<div class="card player ' + (isDead ? 'dead' : '') + '" style="' + borderStyle + '" onclick="selectHero(' + index + ')">' +
                    '<div class="card-image-placeholder" style="' + imgStyle + '">' + (!hero.img ? 'Héros' : '') + '</div>' +
                    '<div class="card-content">' +
                        '<div class="card-name">' + hero.name + '</div>' +
                        '<div class="card-rarity" style="color: ' + hero.color + ';">' + hero.emoji + ' ' + hero.rarity + '</div>' +
                        '<div class="hp-bar-bg"><div class="hp-bar-fill" style="background: ' + hero.color + '; width: ' + ((hero.hp / hero.maxHp) * 100) + '%;"></div></div>' +
                        '<div class="hp-text">' + hero.hp + ' / ' + hero.maxHp + ' HP</div>' +
                    '</div>' +
                '</div>';
            }).join('');

            // Render Équipe Ennemie
            enemyContainer.innerHTML = state.enemyTeam.map(hero => {
                const isDead = hero.hp <= 0;
                const enemyColor = "var(--danger-red)";
                const imgStyle = getImageUrl(hero.img);

                return '<div class="card ' + (isDead ? 'dead' : '') + '" style="border-color: ' + enemyColor + ';">' +
                    '<div class="card-image-placeholder" style="' + imgStyle + ' filter: sepia(1) hue-rotate(-50deg);">' + (!hero.img ? 'Adversaire' : '') + '</div>' +
                    '<div class="card-content">' +
                        '<div class="card-name">' + hero.name + '</div>' +
                        '<div class="card-rarity" style="color: ' + enemyColor + ';">🔴 Hater</div>' +
                        '<div class="hp-bar-bg"><div class="hp-bar-fill" style="background: ' + enemyColor + '; width: ' + ((hero.hp / hero.maxHp) * 100) + '%;"></div></div>' +
                        '<div class="hp-text">' + hero.hp + ' / ' + hero.maxHp + ' HP</div>' +
                    '</div>' +
                '</div>';
            }).join('');
        }

        function selectHero(index) {
            if (state.turn !== 'player' || state.playerTeam[index].hp <= 0) return;
            state.selectedIdx = index;
            renderBoard();

            const hero = state.playerTeam[index];
            const panel = document.getElementById('action-panel');
            
            panel.innerHTML = hero.skills.map((skill, skillIndex) => {
                const effectText = skill.dmg > 0 ? "-" + skill.dmg + " HP" : "+" + Math.abs(skill.dmg) + " HP";
                return '<button class="action-btn" style="color: ' + hero.color + '; border-color: ' + hero.color + ';" onclick="executeAction(' + skillIndex + ')">' + skill.name + ' (' + effectText + ')</button>';
            }).join('');
        }

        function executeAction(skillIndex) {
            if (state.selectedIdx === null || state.turn !== 'player') return;

            const hero = state.playerTeam[state.selectedIdx];
            const skill = hero.skills[skillIndex];

            if (skill.dmg > 0) {
                let aliveEnemies = state.enemyTeam.filter(e => e.hp > 0);
                if (aliveEnemies.length === 0) return;
                
                let target = aliveEnemies[Math.floor(Math.random() * aliveEnemies.length)];
                target.hp = Math.max(0, target.hp - skill.dmg);
                updateLog(hero.name + " attaque " + target.name + " et inflige " + skill.dmg + " dégâts !");
            } else {
                hero.hp = Math.min(hero.maxHp, hero.hp + Math.abs(skill.dmg));
                updateLog(hero.name + " se soigne de " + Math.abs(skill.dmg) + " HP.");
            }

            document.getElementById('action-panel').innerHTML = "";
            state.selectedIdx = null;
            renderBoard();

            let enemiesAlive = state.enemyTeam.filter(e => e.hp > 0).length;
            if (enemiesAlive === 0) {
                endGame("VICTOIRE ! L'équipe adverse a été anéantie.", "var(--twitch-purple)");
                return;
            }

            executeAITurn();
        }

        function executeAITurn() {
            state.turn = 'enemy';
            
            setTimeout(() => {
                let aliveEnemies = state.enemyTeam.filter(e => e.hp > 0);
                let alivePlayers = state.playerTeam.filter(p => p.hp > 0);
                
                if (aliveEnemies.length > 0 && alivePlayers.length > 0) {
                    let attacker = aliveEnemies[Math.floor(Math.random() * aliveEnemies.length)];
                    let target = alivePlayers[Math.floor(Math.random() * alivePlayers.length)];
                    let skill = attacker.skills[0];
                    
                    target.hp = Math.max(0, target.hp - skill.dmg);
                    updateLog("L'adversaire " + attacker.name + " attaque " + target.name + " (-" + skill.dmg + " HP) !");
                }
                
                renderBoard();

                let playersAlive = state.playerTeam.filter(p => p.hp > 0).length;
                if (playersAlive === 0) {
                    endGame("DÉFAITE... Ton équipe a été vaincue.", "var(--danger-red)");
                    return;
                }
                
                state.turn = 'player';
            }, 1500);
        }

        function endGame(message, color) {
            state.turn = 'ended';
            updateLog(message);
            document.getElementById('action-panel').innerHTML = '<button class="action-btn" style="background: ' + color + '; border-color: ' + color + ';" onclick="location.reload()">Rejouer une partie</button>';
        }

        window.onload = initGame;
    </script>
</body>
</html>
