<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOL Battle Game - Combat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container" id="selection-screen">
        <h1>Choisis ton héros</h1>
        <div class="roster" id="roster"></div>
    </div>

    <div class="container" id="battle-screen" style="display: none;">
        <div class="arena">
            <div>
                <h3 id="p-name">Joueur</h3>
                <div class="health-bar-bg"><div id="p-bar" class="health-fill"></div></div>
                <p id="p-hp">150/150</p>
            </div>
            <div>
                <h3 id="e-name">Ennemi</h3>
                <div class="health-bar-bg"><div id="e-bar" class="health-fill"></div></div>
                <p id="e-hp">150/150</p>
            </div>
        </div>
        
        <div id="log" style="text-align: center; min-height: 25px; margin-bottom: 15px; font-weight: bold; color: #9146ff; font-size: 1.1rem;">
            Que le combat commence !
        </div>

        <div class="action-grid" id="actions">
            <button class="skill" id="s-basic" onclick="play('basic')"></button>
            <button class="skill" id="s-heal" onclick="play('heal')"></button>
            <button class="skill" id="s-brise" onclick="play('brise')"></button>
            <button class="skill" id="s-bigHeal" onclick="play('bigHeal')"></button>
            <button class="skill" id="s-stun" onclick="play('stun')"></button>
            <button class="skill" id="s-toxic" onclick="play('toxic')"></button>
            <button class="skill" id="s-ulti" onclick="play('ulti')"></button>
        </div>
    </div>

    <div class="container" id="end-screen">
        <h1 id="end-title">Victoire !</h1>
        <button class="btn-game btn-play" onclick="location.reload()">Rejouer</button>
        <button class="btn-game btn-home" onclick="location.href='index.html'">Accueil</button>
    </div>

    <script>
        const diff = localStorage.getItem('diff') || 'normal';
        let pHP=150, eHP=150, active=true;
        let playerName = "";
        let enemyName = "";
        
        // Base de données des personnages
        const charData = {
            "House of Laura": {
                'basic': { name: 'Hype du Chat', dmg: 15, heal: 0, cd: 0 },
                'heal': { name: 'Pause Café', dmg: 0, heal: 20, cd: 2 },
                'brise': { name: 'Raid Massif', dmg: 25, heal: 0, cd: 2 },
                'bigHeal': { name: 'Soutien des Subs', dmg: 0, heal: 50, cd: 3 },
                'stun': { name: 'Bannissement', dmg: 10, heal: 0, cd: 4 },
                'toxic': { name: 'Drama', dmg: 15, heal: 0, cd: 4 },
                'ulti': { name: 'Fin de Live !', dmg: 40, heal: 0, cd: 6 }
            },
            "HOL Rozuya": {
                'basic': { name: 'Ligne de Code', dmg: 15, heal: 0, cd: 0 },
                'heal': { name: 'Corriger Bug', dmg: 0, heal: 20, cd: 2 },
                'brise': { name: 'Compilation', dmg: 25, heal: 0, cd: 2 },
                'bigHeal': { name: 'Backup Serveur', dmg: 0, heal: 50, cd: 3 },
                'stun': { name: 'Écran Bleu', dmg: 10, heal: 0, cd: 4 },
                'toxic': { name: 'Faille Critique', dmg: 15, heal: 0, cd: 4 },
                'ulti': { name: 'Grosse Mise à Jour', dmg: 40, heal: 0, cd: 6 }
            },
            "HOL Tony": {
                'basic': { name: 'Coup de Poing', dmg: 15, heal: 0, cd: 0 },
                'heal': { name: 'Boisson Énergie', dmg: 0, heal: 20, cd: 2 },
                'brise': { name: 'Tacle Glissé', dmg: 25, heal: 0, cd: 2 },
                'bigHeal': { name: 'Second Souffle', dmg: 0, heal: 50, cd: 3 },
                'stun': { name: 'Coup Bas', dmg: 10, heal: 0, cd: 4 },
                'toxic': { name: 'Provocation', dmg: 15, heal: 0, cd: 4 },
                'ulti': { name: 'Combo Furieux', dmg: 40, heal: 0, cd: 6 }
            },
            "HOL Omass": {
                'basic': { name: 'Tir Précis', dmg: 15, heal: 0, cd: 0 },
                'heal': { name: 'Pansement', dmg: 0, heal: 20, cd: 2 },
                'brise': { name: 'Balle Perçante', dmg: 25, heal: 0, cd: 2 },
                'bigHeal': { name: 'Trousse de Soin', dmg: 0, heal: 50, cd: 3 },
                'stun': { name: 'Grenade Flash', dmg: 10, heal: 0, cd: 4 },
                'toxic': { name: 'Gaz Toxique', dmg: 15, heal: 0, cd: 4 },
                'ulti': { name: 'Frappe Orbitale', dmg: 40, heal: 0, cd: 6 }
            },
            "K974YT": {
                'basic': { name: 'Clic Droit', dmg: 15, heal: 0, cd: 0 },
                'heal': { name: 'Soin Manette', dmg: 0, heal: 20, cd: 2 },
                'brise': { name: 'Coup Critique', dmg: 25, heal: 0, cd: 2 },
                'bigHeal': { name: 'Heal de Zone', dmg: 0, heal: 50, cd: 3 },
                'stun': { name: 'Gros Lagg', dmg: 10, heal: 0, cd: 4 },
                'toxic': { name: 'Commu Ranked', dmg: 15, heal: 0, cd: 4 },
                'ulti': { name: 'Gros Tryhard', dmg: 40, heal: 0, cd: 6 }
            },
            "Dark MortelCygne": {
                'basic': { name: 'Plume Noire', dmg: 15, heal: 0, cd: 0 },
                'heal': { name: 'Vol de Vie', dmg: 0, heal: 20, cd: 2 },
                'brise': { name: 'Frappe Obscure', dmg: 25, heal: 0, cd: 2 },
                'bigHeal': { name: 'Aura Ténébreuse', dmg: 0, heal: 50, cd: 3 },
                'stun': { name: 'Peur Bleue', dmg: 10, heal: 0, cd: 4 },
                'toxic': { name: 'Poison Obscur', dmg: 15, heal: 0, cd: 4 },
                'ulti': { name: 'Éclipse Totale', dmg: 40, heal: 0, cd: 6 }
            }
        };

        // On sépare totalement le cerveau du joueur et de l'IA
        let pSkills = {}; // Compétences du Joueur
        let eSkills = {}; // Compétences de l'Ennemi

        const heroes = Object.keys(charData);
        
        heroes.forEach(n => {
            let d = document.createElement('div'); d.className='character-card'; d.innerText=n;
            d.onclick = () => start(n); document.getElementById('roster').appendChild(d);
        });

        // Fonction pour savoir quelles compétences sont autorisées selon la difficulté
        function isSkillAllowed(k) {
            if(diff === 'facile') return k === 'basic' || k === 'heal'; // 2 comp
            if(diff === 'normal') return ['basic','heal','brise','bigHeal'].includes(k); // 4 comp
            if(diff === 'difficile') return ['basic','heal','brise','bigHeal','stun','toxic'].includes(k); // 6 comp
            return true; // expert: 7 comp
        }

        function start(name) {
            playerName = name;
            // L'IA choisit un personnage au hasard
            enemyName = heroes[Math.floor(Math.random() * heroes.length)];

            document.getElementById('selection-screen').style.display = 'none';
            document.getElementById('battle-screen').style.display = 'block';
            document.getElementById('p-name').innerText = playerName;
            document.getElementById('e-name').innerText = enemyName + " (" + diff + ")";
            
            const myHero = charData[playerName];
            const aiHero = charData[enemyName];

            // Charger les compétences du Joueur ET de l'IA
            for(let k in myHero) {
                let descText = myHero[k].heal > 0 ? "+" + myHero[k].heal + " PV" : myHero[k].dmg + " Dmg";
                descText += " (" + myHero[k].cd + " CD)";

                pSkills[k] = { name: myHero[k].name, dmg: myHero[k].dmg, heal: myHero[k].heal, cd: myHero[k].cd, cdCurrent: 0, desc: descText };
                eSkills[k] = { name: aiHero[k].name, dmg: aiHero[k].dmg, heal: aiHero[k].heal, cd: aiHero[k].cd, cdCurrent: 0 };

                let btn = document.getElementById('s-' + k);
                if(btn) {
                    btn.innerHTML = '<strong>' + myHero[k].name + '</strong><small>' + descText + '</small>';
                    if(!isSkillAllowed(k)) btn.style.display = 'none'; // Masquer selon la difficulté
                }
            }
        }

        function logCombat(actor, skillName) {
            const logDiv = document.getElementById('log');
            logDiv.innerText = actor + " utilise " + skillName + " !";
            // L'IA s'affiche en rouge clair, le joueur en violet
            logDiv.style.color = actor === playerName ? "#9146ff" : "#ff4d4d"; 
        }

        function play(action) {
            if(!active) return;
            executeMove(action, true);
            if(eHP > 0) { active = false; setTimeout(iaTurn, 1200); } // Petite pause pour lire le journal
        }

        function executeMove(action, isPlayer) {
            if(isPlayer) { 
                let s = pSkills[action];
                eHP = Math.max(0, eHP - s.dmg); 
                pHP = Math.min(150, pHP + s.heal); 
                s.cdCurrent = s.cd; 
                logCombat(playerName, s.name);
            } else { 
                let s = eSkills[action];
                pHP = Math.max(0, pHP - s.dmg); 
                eHP = Math.min(150, eHP + s.heal); 
                s.cdCurrent = s.cd;
                logCombat(enemyName, s.name);
            }
            
            updateUI();
            if(pHP <= 0 || eHP <= 0) endGame(eHP <= 0);
        }

        function iaTurn() {
            // L'IA regarde SES compétences autorisées et sans cooldown
            let validMoves = Object.keys(eSkills).filter(k => 
                eSkills[k].cdCurrent === 0 && isSkillAllowed(k)
            );

            let move = "basic";
            
            if(diff === 'facile') {
                move = validMoves[Math.floor(Math.random() * validMoves.length)];
            } else if(diff === 'normal') {
                if(eHP < 60 && validMoves.includes('heal')) move = 'heal';
                else move = validMoves[Math.floor(Math.random() * validMoves.length)];
            } else {
                if(eHP < 40 && validMoves.includes('bigHeal')) move = 'bigHeal';
                else if(eHP < 70 && validMoves.includes('heal')) move = 'heal';
                else if(pHP < 40 && validMoves.includes('ulti')) move = 'ulti';
                else if(validMoves.includes('stun')) move = 'stun';
                else if(validMoves.includes('brise')) move = 'brise';
                else move = 'basic';
            }

            executeMove(move, false);
            
            // On descend les temps de recharge pour tout le monde à la fin du tour
            for(let k in pSkills) { if(pSkills[k].cdCurrent > 0) pSkills[k].cdCurrent--; }
            for(let k in eSkills) { if(eSkills[k].cdCurrent > 0) eSkills[k].cdCurrent--; }
            
            active = true;
            updateUI(); 
        }

        function updateUI() {
            document.getElementById('p-hp').innerText = pHP + "/150";
            document.getElementById('e-hp').innerText = eHP + "/150";
            document.getElementById('p-bar').style.width = (pHP/150*100) + "%";
            document.getElementById('e-bar').style.width = (eHP/150*100) + "%";
            
            // On met à jour uniquement les boutons du joueur
            for(let k in pSkills) {
                let btn = document.getElementById('s-' + k);
                if(btn) {
                    let small = btn.querySelector('small');
                    if(pSkills[k].cdCurrent > 0) {
                        btn.disabled = true;
                        small.innerText = "Recharge: " + pSkills[k].cdCurrent;
                    } else {
                        btn.disabled = false;
                        small.innerText = pSkills[k].desc;
                    }
                }
            }
        }

        function endGame(isWin) {
            document.getElementById('battle-screen').style.display = 'none';
            document.getElementById('end-screen').style.display = 'block';
            const title = document.getElementById('end-title');
            title.innerText = isWin ? "VICTOIRE !" : "DÉFAITE...";
            title.style.color = isWin ? "#2ecc71" : "#e74c3c";
        }
    </script>
</body>
</html>
