<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOL Battle Game - Combat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container" id="selection-screen">
        <h1>Choisis ton héros</h1>
        <div class="roster" id="roster"></div>
    </div>

    <div class="container" id="battle-screen" style="display: none;">
        <div class="arena">
            <div>
                <h3 id="p-name">Joueur</h3>
                <div class="health-bar-bg"><div id="p-bar" class="health-fill"></div></div>
                <p id="p-hp">150/150</p>
            </div>
            <div>
                <h3 id="e-name">Ennemi</h3>
                <div class="health-bar-bg"><div id="e-bar" class="health-fill"></div></div>
                <p id="e-hp">150/150</p>
            </div>
        </div>
        <div id="log"></div>
        <div class="action-grid" id="actions">
            <button class="skill" id="s-basic" onclick="play('basic')"><strong>Attaque</strong><small>15 Dmg (0 CD)</small></button>
            <button class="skill" id="s-heal" onclick="play('heal')"><strong>Soin</strong><small>+20 PV (2 CD)</small></button>
            <button class="skill" id="s-brise" onclick="play('brise')"><strong>Brise Armure</strong><small>25 Dmg (2 CD)</small></button>
            <button class="skill" id="s-bigHeal" onclick="play('bigHeal')"><strong>Gros Soin</strong><small>+50 PV (3 CD)</small></button>
            <button class="skill" id="s-stun" onclick="play('stun')"><strong>Ban Chat</strong><small>Neutralise (4 CD)</small></button>
            <button class="skill" id="s-toxic" onclick="play('toxic')"><strong>Toxicité</strong><small>Poison (4 CD)</small></button>
            <button class="skill" id="s-ulti" onclick="play('ulti')"><strong>ULTI</strong><small>40 Dmg (6 CD)</small></button>
        </div>
    </div>

    <div class="container" id="end-screen">
        <h1 id="end-title">Victoire !</h1>
        <button class="btn-game btn-play" onclick="location.reload()">Rejouer</button>
        <button class="btn-game btn-home" onclick="location.href='index.html'">Accueil</button>
    </div>

    <script>
        const diff = localStorage.getItem('diff') || 'normal';
        let pHP=150, eHP=150, active=true;
        
        const skillConfig = {
            'basic': { dmg: 15, heal: 0, cd: 0, current: 0, desc: '15 Dmg (0 CD)' },
            'heal': { dmg: 0, heal: 20, cd: 2, current: 0, desc: '+20 PV (2 CD)' },
            'brise': { dmg: 25, heal: 0, cd: 2, current: 0, desc: '25 Dmg (2 CD)' },
            'bigHeal': { dmg: 0, heal: 50, cd: 3, current: 0, desc: '+50 PV (3 CD)' },
            'stun': { dmg: 10, heal: 0, cd: 4, current: 0, desc: 'Neutralise (4 CD)' },
            'toxic': { dmg: 15, heal: 0, cd: 4, current: 0, desc: 'Poison (4 CD)' },
            'ulti': { dmg: 40, heal: 0, cd: 6, current: 0, desc: '40 Dmg (6 CD)' }
        };

        const heroes = ["House of Laura", "HOL Tony", "HOL Rozuya", "HOL Omass", "K974YT", "Dark MortelCygne"];
        
        // Init Roster
        heroes.forEach(n => {
            let d = document.createElement('div'); d.className='character-card'; d.innerText=n;
            d.onclick = () => start(n); document.getElementById('roster').appendChild(d);
        });

        function start(name) {
            document.getElementById('selection-screen').style.display = 'none';
            document.getElementById('battle-screen').style.display = 'block';
            document.getElementById('p-name').innerText = name;
            document.getElementById('e-name').innerText = "IA (" + diff + ")";
            
            // Masquage dynamique
            const list = ['brise','bigHeal','stun','toxic','ulti'];
            list.forEach(s => { let btn = document.getElementById('s-'+s); if(btn) btn.style.display = 'none'; });
            if(diff !== 'facile') { document.getElementById('s-brise').style.display = 'flex'; document.getElementById('s-bigHeal').style.display = 'flex'; }
            if(diff === 'difficile' || diff === 'expert') { document.getElementById('s-stun').style.display = 'flex'; document.getElementById('s-toxic').style.display = 'flex'; }
            if(diff === 'expert') { document.getElementById('s-ulti').style.display = 'flex'; }
        }

        function play(action) {
            if(!active) return;
            executeMove(action, true);
            if(eHP > 0) { active = false; setTimeout(iaTurn, 1000); }
        }

        function executeMove(action, isPlayer) {
            let s = skillConfig[action];
            if(isPlayer) { eHP = Math.max(0, eHP - s.dmg); pHP = Math.min(150, pHP + s.heal); }
            else { pHP = Math.max(0, pHP - s.dmg); eHP = Math.min(150, eHP + s.heal); }
            
            s.current = s.cd;
            updateUI();
            if(pHP <= 0 || eHP <= 0) endGame(eHP <= 0);
        }

        function iaTurn() {
            let validMoves = Object.keys(skillConfig).filter(k => 
                skillConfig[k].current === 0 && 
                (document.getElementById('s-'+k) && document.getElementById('s-'+k).style.display !== 'none' || k === 'basic' || k === 'heal')
            );

            let move = "basic";
            // IA intelligente
            if(diff === 'facile') {
                move = validMoves[Math.floor(Math.random() * validMoves.length)];
            } else if(diff === 'normal') {
                if(eHP < 60 && validMoves.includes('heal')) move = 'heal';
                else move = validMoves[Math.floor(Math.random() * validMoves.length)];
            } else {
                if(eHP < 40 && validMoves.includes('bigHeal')) move = 'bigHeal';
                else if(eHP < 70 && validMoves.includes('heal')) move = 'heal';
                else if(pHP < 40 && validMoves.includes('ulti')) move = 'ulti';
                else if(validMoves.includes('stun')) move = 'stun';
                else if(validMoves.includes('brise')) move = 'brise';
                else move = 'basic';
            }

            executeMove(move, false);
            for(let k in skillConfig) if(skillConfig[k].current > 0) skillConfig[k].current--;
            active = true;
            updateUI();
        }

        function updateUI() {
            document.getElementById('p-hp').innerText = pHP + "/150";
            document.getElementById('e-hp').innerText = eHP + "/150";
            document.getElementById('p-bar').style.width = (pHP/150*100) + "%";
            document.getElementById('e-bar').style.width = (eHP/150*100) + "%";
            
            for(let k in skillConfig) {
                let btn = document.getElementById('s-' + k);
                if(btn) {
                    let small = btn.querySelector('small');
                    if(skillConfig[k].current > 0) {
                        btn.disabled = true;
                        small.innerText = "Recharge: " + skillConfig[k].current;
                    } else {
                        btn.disabled = false;
                        small.innerText = skillConfig[k].desc;
                    }
                }
            }
        }

        function endGame(isWin) {
            document.getElementById('battle-screen').style.display = 'none';
            document.getElementById('end-screen').style.display = 'block';
            const title = document.getElementById('end-title');
            title.innerText = isWin ? "VICTOIRE !" : "DÉFAITE...";
            title.style.color = isWin ? "#2ecc71" : "#e74c3c";
        }
    </script>
</body>
</html>
