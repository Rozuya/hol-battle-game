<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOL Battle Arena</title>
    <style>
        body { background-color: #121212; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: sans-serif; }
        .container { width: 100%; max-width: 500px; text-align: center; padding: 20px; }
        
        /* Grille des compétences (2 colonnes pour bien voir le texte) */
        .skills-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
        
        .skill-btn { padding: 15px; background: #1a1a1a; border: 1px solid #9146ff; color: white; border-radius: 8px; cursor: pointer; font-size: 0.9rem; }
        .skill-btn:hover { background: #9146ff; }
        
        /* Style des barres de vie comme sur tes photos */
        .health-bar { width: 100%; height: 15px; background: #333; border-radius: 5px; margin: 10px 0; }
        .health-fill { height: 100%; background: #9146ff; width: 100%; transition: width 0.3s; }
    </style>
</head>
<body>

    <div class="container" id="battle-screen">
        <div style="display: flex; justify-content: space-around; margin-bottom: 20px;">
            <div style="width: 45%;"><h3 id="p-name"></h3><div class="health-bar"><div id="p-bar" class="health-fill"></div></div></div>
            <div style="width: 45%;"><h3 id="e-name"></h3><div class="health-bar"><div id="e-bar" class="health-fill"></div></div></div>
        </div>
        
        <div id="status-msg" style="margin: 20px 0; font-weight: bold; color: #9146ff;"></div>
        
        <div class="skills-grid" id="skills-grid"></div>
    </div>

    <script>
        // Ta base de données
        const charData = {
            "House of Laura": { hp: 150, skills: [
                { name: 'Hype du Chat', dmg: 18, heal: 0, cd: 0 },
                { name: 'Pause Café', dmg: 0, heal: 25, cd: 2 },
                { name: 'Raid Massif', dmg: 30, heal: 0, cd: 2 },
                { name: 'Soutien des Subs', dmg: 0, heal: 60, cd: 3 },
                { name: 'Mod Hammer', dmg: 35, heal: 0, cd: 3 },
                { name: 'Clip Viral', dmg: 0, heal: 60, cd: 4 },
                { name: 'Ban Hammer', dmg: 50, heal: 0, cd: 5 }
            ]},
            /* Ajoute les autres persos ici avec la même structure */
        };

        function initCombat() {
            const pName = "House of Laura"; // Récupéré de ton index
            const diff = localStorage.getItem('diff') || 'normal';
            
            // Logique de limite de compétences
            let limit = (diff === 'facile') ? 2 : (diff === 'normal') ? 4 : (diff === 'difficile') ? 6 : 7;
            const availableSkills = charData[pName].skills.slice(0, limit);

            // Affichage
            document.getElementById('p-name').innerText = pName;
            document.getElementById('status-msg').innerText = "Que le combat commence !";

            const grid = document.getElementById('skills-grid');
            availableSkills.forEach(s => {
                const btn = document.createElement('button');
                btn.className = 'skill-btn';
                // Affichage exactement comme sur ta capture (Nom + Dmg/Soin + CD)
                btn.innerHTML = `<b>${s.name}</b><br>${s.dmg > 0 ? s.dmg + ' Dmg' : '+' + s.heal + ' PV'} (${s.cd} CD)`;
                grid.appendChild(btn);
            });
        }

        initCombat();
    </script>
</body>
</html>
