<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Combat HOL</title>
</head>
<body>
    <div class="container">
        <div id="roster" class="roster"></div>
        <div id="battle" style="display:none">
            <div class="arena">
                <div class="health-bar"><div id="p-bar" class="bar-fill"></div></div>
                <div class="health-bar"><div id="e-bar" class="bar-fill" style="background:#ff4646"></div></div>
            </div>
            <div id="log" style="margin: 10px 0; color: #b3b3b3;">À toi de jouer !</div>
            <div id="actions" class="roster"></div>
        </div>
    </div>

    <script>
        // Compétences triées par dégâts (d) croissants pour chaque héros
        const chars = {
            "House of Laura": {hp:260, skills:[{n:'Pause',d:10},{n:'Soutien',d:20},{n:'Hype',d:40},{n:'Combo',d:50},{n:'Raid',d:60},{n:'Ban',d:80},{n:'Mega',d:90}]},
            "HOL Rozuya": {hp:230, skills:[{n:'Code',d:20},{n:'Soin',d:25},{n:'Debug',d:30},{n:'Compile',d:30},{n:'Backup',d:40},{n:'Panic',d:50},{n:'Flash',d:60}]},
            "HOL Tony": {hp:300, skills:[{n:'Bloc',d:10},{n:'Cri',d:20},{n:'Tacle',d:30},{n:'Rush',d:40},{n:'Charge',d:50},{n:'Impact',d:55},{n:'Stun',d:20}]},
            "HOL Omass": {hp:250, skills:[{n:'Rush',d:20},{n:'Kick',d:30},{n:'Punch',d:40},{n:'Slam',d:45},{n:'Combo',d:50},{n:'Uppercut',d:60},{n:'Fury',d:70}]},
            "K974YT": {hp:200, skills:[{n:'Jump',d:20},{n:'Dash',d:25},{n:'Silent',d:30},{n:'Cut',d:40},{n:'Slash',d:50},{n:'Blade',d:65},{n:'Backstab',d:70}]},
            "Dark MortelCygne": {hp:220, skills:[{n:'Ombre',d:25},{n:'Plume',d:30},{n:'Griffe',d:40},{n:'Night',d:50},{n:'Black',d:60},{n:'Étreinte',d:80},{n:'Soul',d:90}]}
        };

        let pName, eName, pHP, eHP, pMax, eMax, pS, eS, isPlayerTurn = true;
        let diff = parseInt(localStorage.getItem('diff')) || 4;

        Object.keys(chars).forEach(n => {
            let b = document.createElement('button'); b.className = 'btn'; b.innerText = n;
            b.onclick = () => start(n); document.getElementById('roster').appendChild(b);
        });

        function start(n) {
            pName = n;
            let ops = Object.keys(chars).filter(x => x !== n);
            eName = ops[Math.floor(Math.random() * ops.length)];
            pHP = pMax = chars[pName].hp;
            eHP = eMax = chars[eName].hp;
            // Limite le nombre de compétences selon la difficulté (2, 4, 6, 7)
            pS = chars[pName].skills.slice(0, diff);
            eS = chars[eName].skills.slice(0, diff);
            document.getElementById('roster').style.display = 'none';
            document.getElementById('battle').style.display = 'block';
            updateUI();
        }

        function getAISkill() {
            // Logique fixe selon la difficulté
            let sorted = [...eS].sort((a,b) => a.d - b.d);
            if(diff == 2) return sorted[0];           // Toujours la plus faible
            if(diff == 4) return sorted[1];           // 2ème plus faible
            if(diff == 6) return sorted[sorted.length-2]; // 2ème plus forte
            return sorted[sorted.length-1];           // Toujours la plus forte
        }

        function updateUI() {
            document.getElementById('p-bar').style.width = (pHP/pMax*100) + "%";
            document.getElementById('e-bar').style.width = (eHP/eMax*100) + "%";
            let act = document.getElementById('actions'); act.innerHTML = '';
            if(isPlayerTurn) {
                pS.forEach((s, i) => {
                    let b = document.createElement('button'); b.className = 'btn'; b.innerText = s.n;
                    b.onclick = () => play(i); act.appendChild(b);
                });
            }
        }

        function play(i) {
            if(!isPlayerTurn) return;
            eHP = Math.max(0, eHP - pS[i].d);
            isPlayerTurn = false;
            updateUI();
            if(eHP > 0) {
                setTimeout(() => {
                    let s = getAISkill();
                    pHP = Math.max(0, pHP - s.d);
                    isPlayerTurn = true;
                    document.getElementById('log').innerText = `L'IA a utilisé ${s.n}`;
                    updateUI();
                    if(pHP <= 0) { alert("Défaite !"); location.reload(); }
                }, 1000);
            } else { alert("Victoire !"); location.reload(); }
        }
    </script>
</body>
</html>
