<script>
        let currentDifficulty = 'normal';
        let player, enemy, gameActive = true;
        const characters = ["House of Laura", "HOL Tony", "HOL Rozuya", "HOL Omass", "K974YT", "Dark MortelCygne"];

        class Fighter {
            constructor(name, maxHp) { 
                this.name = name; 
                this.maxHp = maxHp; 
                this.hp = maxHp; 
                this.cooldowns = { briseDef: 0, stun: 0, antiHeal: 0, bigHeal: 0 }; 
            }
        }

        function setDifficulty(diff) {
            currentDifficulty = diff;
            document.getElementById('difficulty-screen').style.display = 'none';
            document.getElementById('selection-screen').style.display = 'block';
            renderRoster();
        }

        function backToDifficulty() {
            document.getElementById('selection-screen').style.display = 'none';
            document.getElementById('difficulty-screen').style.display = 'block';
        }

        function renderRoster() {
            const rosterDiv = document.getElementById('roster');
            rosterDiv.innerHTML = '';
            characters.forEach(char => {
                let div = document.createElement('div');
                div.className = 'character-card';
                div.innerText = char;
                div.onclick = () => startGame(char);
                rosterDiv.appendChild(div);
            });
        }

        function startGame(selectedChar) {
            document.getElementById('selection-screen').style.display = 'none';
            document.getElementById('battle-screen').style.display = 'block';
            
            player = new Fighter(selectedChar, 150);
            enemy = new Fighter("IA Ennemie", 150);
            
            // Réinitialisation forcée des boutons
            const buttons = ['btn-briseDef', 'btn-bigHeal', 'btn-stun', 'btn-antiHeal'];
            buttons.forEach(id => {
                let btn = document.getElementById(id);
                btn.style.display = (currentDifficulty === 'facile' || (currentDifficulty === 'normal' && (id === 'btn-stun' || id === 'btn-antiHeal'))) ? 'none' : 'block';
                btn.disabled = false; // ON ACTIVE BIEN LES BOUTONS ICI
            });

            log("Combat lancé ! À toi de jouer.");
        }

        function log(msg) { 
            const logDiv = document.getElementById('combat-log');
            logDiv.innerHTML = `<div>${msg}</div>` + logDiv.innerHTML;
        }

        // C'est cette fonction qui est appelée au clic sur les boutons
        function executeAction(action) {
            if (!gameActive) return;
            
            // Exemple de logique pour l'attaque
            if (action === 'basic') {
                log("⚔️ Tu infliges des dégâts basiques !");
                enemy.hp -= 10;
            } else {
                log(`⚡ Utilisation de la compétence : ${action}`);
            }
            
            // Ici tu mets la mise à jour de ton interface
            document.getElementById('enemy-hp-text').innerText = `${enemy.hp}/150`;
        }
    </script>
