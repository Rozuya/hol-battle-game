<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOL Battle Game - Difficulté</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Choix de la difficulté</h1>
        <button class="btn-main" onclick="setDiff('facile')">Facile</button>
        <button class="btn-main" onclick="setDiff('normal')">Normal</button>
        <button class="btn-main" onclick="setDiff('difficile')">Difficile</button>
        <button class="btn-main" style="background:#e74c3c" onclick="setDiff('expert')">Expert</button>
        <button class="btn-main btn-home" onclick="location.href='index.html'">Retour à l'accueil</button>
    </div>

    <script>
        function setDiff(level) {
            localStorage.setItem('diff', level);
            location.href = 'jeu.html';
        }
    </script>
</body>
</html>
