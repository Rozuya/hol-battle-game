<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choisis ta difficulté</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Choisis ta difficulté</h1>
        <button class="btn" onclick="setDiff(1)">Facile (2 Compétences)</button>
        <button class="btn" onclick="setDiff(2)">Normal (4 Compétences)</button>
        <button class="btn" onclick="setDiff(3)">Difficile (6 Compétences)</button>
        <button class="btn" onclick="setDiff(4)">Expert (7 Compétences)</button>
    </div>

    <script>
        function setDiff(val) {
            localStorage.setItem('diff', val);
            location.href = 'personnage.html'; 
        }
    </script>
</body>
</html>
