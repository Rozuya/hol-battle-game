<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Choix Difficulté</title>
    <style>
        body { background: #0e0e10; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #1f1f23; padding: 30px; border-radius: 12px; width: 300px; text-align: center; }
        button { display: block; width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Difficulté</h1>
        <button style="background:#2ecc71" onclick="select('facile')">Facile</button>
        <button style="background:#3498db" onclick="select('normal')">Normal</button>
        <button style="background:#e67e22" onclick="select('difficile')">Difficile</button>
        <button style="background:#e74c3c" onclick="select('expert')">Expert</button>
    </div>
    <script>
        function select(d) {
            localStorage.setItem('diff', d);
            window.location.href = 'jeu.html';
        }
    </script>
</body>
</html>
