<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>House of Laura | Menu</title>
    <style>
        /* Animation fond slide */
        @keyframes gradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        body { margin: 0; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: white;
               background: linear-gradient(-45deg, #060608, #18181b, #4c1d95, #060608); background-size: 400% 400%; animation: gradient 15s ease infinite; }
        
        .box { background: rgba(0,0,0,0.8); padding: 40px; border-radius: 20px; text-align: center; width: 350px; border: 1px solid #333; backdrop-filter: blur(10px); }
        h1 { font-size: 2rem; color: #9146ff; margin-bottom: 30px; text-transform: uppercase; }
        button { width: 100%; padding: 15px; margin: 8px 0; background: #1c1c1c; border: 1px solid #444; color: white; cursor: pointer; border-radius: 10px; font-weight: bold; transition: 0.3s; }
        button:hover { background: #9146ff; border-color: #9146ff; }
        .view { display: none; }
        .active { display: block; }
        .text { text-align: left; font-size: 0.95rem; color: #ccc; line-height: 1.6; padding: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <div id="main" class="view active">
            <h1>HOUSE OF LAURA</h1>
            <button onclick="window.location.href='jeu.html'">LANCER LE JEU</button>
            <button onclick="show('rules')">RÈGLES</button>
            <button onclick="show('news')">ACTUS</button>
            <button onclick="show('settings')">PARAMÈTRES</button>
        </div>
        
        <div id="rules" class="view">
            <h1>RÈGLES</h1>
            <div class="text">Sélectionne ton héros, choisis une attaque, et clique sur l'ennemi. Élimine l'équipe adverse !</div>
            <button onclick="show('main')">RETOUR</button>
        </div>

        <div id="news" class="view">
            <h1>ACTUS</h1>
            <div class="text">• 03/07/2026 : Release officielle.<br>• Le mode local arrive bientôt !</div>
            <button onclick="show('main')">RETOUR</button>
        </div>

        <div id="settings" class="view">
            <h1>PARAMÈTRES</h1>
            <div class="text">Audio : Activé<br>Graphismes : Ultra</div>
            <button onclick="show('main')">RETOUR</button>
        </div>
    </div>

    <script>
        function show(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
